<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Offline - Sanskrit Grammar</title>
    <meta name="theme-color" content="#1a0a00">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1a0a00;
            color: #fdf5e6;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .om-symbol {
            font-size: 84px;
            color: #f4a825;
            text-shadow: 0 0 40px rgba(244, 168, 37, 0.4);
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #f4a825;
        }
        p {
            font-size: 16px;
            color: #c4956a;
            line-height: 1.6;
            max-width: 320px;
            margin-bottom: 32px;
        }
        button {
            background: linear-gradient(135deg, #d35400 0%, #a04000 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(211, 84, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(211, 84, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="om-symbol">ॐ</div>
    <h1>You are offline</h1>
    <p>The path to knowledge requires a connection. Please check your internet and try again.</p>
    <button onclick="window.location.reload()">Reconnect</button>
</body>
</html>
